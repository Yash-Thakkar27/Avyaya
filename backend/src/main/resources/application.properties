# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/avyaya_db
spring.datasource.username=postgres
spring.datasource.password=Tom&Jerry2704
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
avyaya.jwt.secret=avyayaSecretKeyForJWTTokenGenerationAndValidation123456789
avyaya.jwt.expiration=86400000

# Server Configuration
server.port=8080
spring.application.name=avyaya-backend

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:your_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:your_key_secret}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration
avyaya.cors.allowed-origins=http://localhost:3000,http://localhost:3001