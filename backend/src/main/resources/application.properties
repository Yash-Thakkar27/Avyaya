# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/avyaya_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
avyaya.jwt.secret=${AVYAYA_JWT_SECRET:avyayaSecretKeyForJWTTokenGenerationAndValidation123456789}
avyaya.jwt.expiration=86400000

# Server Configuration
server.port=${PORT:8080}
spring.application.name=avyaya-backend

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:your_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:your_key_secret}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration
avyaya.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}